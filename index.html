<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Etiqueta</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  display: flex;
  flex-direction: column;
  align-items: center;
  background: #f2f2f2;
}

/* ETIQUETA */
.etiqueta {
  width: 60mm;
  height: 40mm;
  padding: 3mm;
  border: 2px solid black;
  border-radius: 6mm;
  background: white;
  box-sizing: border-box;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
}

/* TOPO */
.topo {
  display: flex;
  justify-content: space-between;
  font-weight: bold;
  font-size: 12px;
  margin-bottom: 2px;
}

/* LINHAS */
.linha {
  display: flex;
  justify-content: space-between;
  font-size: 9px;
  margin: 2px 0;
}

.label {
  font-weight: bold;
}

/* ESPAÇO EXTRA ENTRE BLOCOS */
.linha:nth-child(4),
.linha:nth-child(5) {
  margin-bottom: 4px;
}

/* RODAPÉ */
.rodape {
  display: flex;
  justify-content: space-between;
  align-items: flex-end;
  margin-top: 4px;
}

.info {
  font-size: 9px;
  line-height: 1.3;
}

.qrcode {
  width: 50px;
  height: 50px;
}

/* BOTÃO */
button {
  margin-top: 18px;
  padding: 12px 28px;
  font-size: 15px;
  border: none;
  border-radius: 10px;
  background: #2b2b2b;
  color: white;
  cursor: pointer;
}

/* IMPRESSÃO */
@media print {
  body {
    background: white;
  }

  button {
    display: none;
  }

  .etiqueta {
    border: 2px solid black;
  }
}
</style>
</head>

<body>

<div class="etiqueta">

  <div class="topo">
    <div id="produto">PRODUTO</div>
    <div id="peso"></div>
  </div>

  <div class="linha"><span class="label">CONSERVAR:</span><span id="conservacao"></span></div>
  <div class="linha"><span class="label">VAL. ORIGINAL:</span><span id="val_original"></span></div>
  <div class="linha"><span class="label">MANIPULAÇÃO:</span><span id="manipulacao"></span></div>
  <div class="linha"><span class="label">VALIDADE:</span><span id="validade"></span></div>
  <div class="linha"><span class="label">MARCA / FORN.:</span><span id="marca"></span></div>
  <div class="linha"><span class="label">SIF:</span><span id="sif"></span></div>
  <div class="linha"><span class="label">LOTE:</span><span id="lote"></span></div>

  <div class="rodape">
    <div class="info">
      RESP.: <span id="resp"></span><br>
      CURVELLO CONFEITARIA<br><br>
      LOTE CONFEITARIA:<br>
      <strong id="lc"></strong>
    </div>

    <img id="qr" class="qrcode">
  </div>

</div>

<button onclick="window.print()">Imprimir etiqueta</button>

<script>
// pegar parâmetros da URL
const params = new URLSearchParams(window.location.search);

function set(id, param) {
  const valor = params.get(param);
  if (valor) document.getElementById(id).innerText = valor;
}

// CAMPOS
set("produto", "produto");
set("conservacao", "conservacao");
set("val_original", "val_original");
set("manipulacao", "manipulacao");
set("validade", "validade");
set("marca", "marca");
set("lote", "lote");
set("resp", "resp");
set("lc", "lc");

// QR CODE
const url = window.location.href;
document.getElementById("qr").src =
  "https://api.qrserver.com/v1/create-qr-code/?size=100x100&data=" + encodeURIComponent(url);
</script>

</body>
</html>
