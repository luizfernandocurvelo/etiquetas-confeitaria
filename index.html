<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Etiqueta</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  display: flex;
  flex-direction: column;
  align-items: center;
  background: #f2f2f2;
}

.etiqueta {
  width: 60mm;
  height: 40mm;
  padding: 3mm;
  border: 2px solid black;
  border-radius: 6mm;
  background: white;
  box-sizing: border-box;
  display: flex;
  flex-direction: column;
}

.topo {
  display: flex;
  justify-content: space-between;
  font-weight: bold;
  font-size: 13px;
}

.linha {
  display: flex;
  justify-content: space-between;
  font-size: 9px;
  margin: 1px 0;
}

.label {
  font-weight: bold;
}

.rodape {
  display: flex;
  justify-content: space-between;
  align-items: flex-end;
}

.info {
  font-size: 8.5px;
}

.qrcode {
  width: 40px;
}

button {
  margin-top: 18px;
  padding: 12px 28px;
  font-size: 15px;
  border: none;
  border-radius: 10px;
  background: #2b2b2b;
  color: white;
  cursor: pointer;
}

@media print {
  button { display: none; }
  body { background: white; }
}
</style>
</head>

<body>

<div class="etiqueta">

  <div class="topo">
    <div id="produto">Produto exemplo</div>
    <div id="peso">1kg</div>
  </div>

  <div>
    <div class="linha"><span class="label">CONSERVAR:</span><span id="conservacao">Resfriado</span></div>
    <div class="linha"><span class="label">VAL. ORIGINAL:</span><span id="val_original">10/08/2026</span></div>
    <div class="linha"><span class="label">MANIPULAÇÃO:</span><span id="manipulacao">06/03/2026 13:30</span></div>
    <div class="linha"><span class="label">VALIDADE:</span><span id="validade">10/03/2026 13:30</span></div>
    <div class="linha"><span class="label">MARCA:</span><span id="marca">Nestle</span></div>
    <div class="linha"><span class="label">LOTE:</span><span id="lote">HJ6782</span></div>
  </div>

  <div class="rodape">
    <div class="info">
      RESP.: <span id="resp">Luiz</span><br>
      CURVELLO CONFEITARIA<br>
      LOTE CONFEITARIA: <span id="lc">001</span>
    </div>

    <img id="qr" class="qrcode">
  </div>

</div>

<button onclick="window.print()">Imprimir etiqueta</button>

<script>
const params = new URLSearchParams(window.location.search);

function set(id, param) {
  const valor = params.get(param);
  if (valor) document.getElementById(id).innerText = valor;
}

set("produto", "produto");
set("peso", "peso");
set("conservacao", "conservacao");
set("val_original", "val_original");
set("manipulacao", "manipulacao");
set("validade", "validade");
set("marca", "marca");
set("lote", "lote");
set("resp", "resp");
set("lc", "lc");

document.getElementById("qr").src =
  "https://api.qrserver.com/v1/create-qr-code/?size=100x100&data=" + encodeURIComponent(window.location.href);
</script>

</body>
</html>
