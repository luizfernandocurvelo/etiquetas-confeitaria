<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Etiqueta</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  display: flex;
  flex-direction: column;
  align-items: center;
  background: #f2f2f2;
}

/* ETIQUETA */
.etiqueta {
  width: 60mm;
  height: 40mm;
  padding: 3mm;
  border: 2px solid black;
  border-radius: 6mm;
  background: white;
  box-sizing: border-box;
  display: flex;
  flex-direction: column;
}

/* TOPO */
.topo {
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-weight: bold;
  font-size: 13px;
  margin-bottom: 2px;
}

#produto {
  font-weight: 800;
  letter-spacing: 0.3px;
}

/* LINHAS */
.linha {
  display: flex;
  justify-content: space-between;
  font-size: 9px;
  margin: 2px 0;
}

.label {
  font-weight: bold;
}

.valor {
  text-align: right;
  min-width: 65px;
}

/* BLOCO */
.bloco {
  flex-grow: 1;
}

/* RODAPÉ */
.rodape {
  display: flex;
  justify-content: space-between;
  align-items: flex-end;
  margin-top: 2px;
}

.info {
  font-size: 8.8px;
  line-height: 1.2;
}

.lote-conf {
  font-weight: bold;
  margin-top: 2px;
}

/* QR */
.qrcode {
  width: 40px;
  height: 40px;
  margin-bottom: 2px;
}

/* BOTÃO */
button {
  margin-top: 18px;
  padding: 12px 28px;
  font-size: 15px;
  border: none;
  border-radius: 10px;
  background: #2b2b2b;
  color: white;
  cursor: pointer;
}

/* IMPRESSÃO */
@media print {
  body {
    background: white;
  }

  button {
    display: none;
  }
}
</style>
</head>

<body>

<div class="etiqueta">

  <div class="topo">
    <div id="produto">PRODUTO</div>
    <div id="peso">1L</div>
  </div>

  <div class="bloco">

    <div class="linha"><span class="label">CONSERVAR:</span><span class="valor" id="conservacao">Resfriado</span></div>
    <div class="linha"><span class="label">VAL. ORIGINAL:</span><span class="valor" id="val_original">18/04/2026 20:00</span></div>
    <div class="linha"><span class="label">MANIPULAÇÃO:</span><span class="valor" id="manipulacao">18/03/2026 00:29</span></div>
    <div class="linha"><span class="label">VALIDADE:</span><span class="valor" id="validade">21/03/2026 00:29</span></div>
    <div class="linha"><span class="label">MARCA / FORN.:</span><span class="valor" id="marca">Nestle</span></div>
    <div class="linha"><span class="label">SIF:</span><span class="valor" id="sif">2025</span></div>
    <div class="linha"><span class="label">LOTE:</span><span class="valor" id="lote">HJ6782</span></div>

  </div>

  <div class="rodape">
    <div class="info">
      RESP.: Luiz<br>
      CURVELLO CONFEITARIA<br>

      <div class="lote-conf">
        LOTE CONFEITARIA:<br>
        001
      </div>
    </div>

    <img id="qr" class="qrcode">
  </div>

</div>

<button onclick="window.print()">Imprimir etiqueta</button>

<script>
const url = window.location.href;

document.getElementById("qr").src =
  "https://api.qrserver.com/v1/create-qr-code/?size=100x100&data=" + encodeURIComponent(url);
</script>

</body>
</html>
