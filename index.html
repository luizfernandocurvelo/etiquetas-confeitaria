<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Etiqueta</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: #f2f2f2;
    display: flex;
    flex-direction: column;
    align-items: center;
    margin-top: 40px;
}

/* ETIQUETA */
.etiqueta {
    width: 420px;
    background: #fff;
    border: 4px solid #000;
    border-radius: 25px;
    padding: 20px;
    position: relative;
}

/* TOPO */
.topo {
    display: flex;
    justify-content: space-between;
}

.produto {
    font-size: 24px;
    font-weight: bold;
    margin-bottom: 12px;
}

.volume {
    font-size: 20px;
    font-weight: bold;
}

/* CONTEUDO */
.conteudo {
    display: flex;
}

/* COLUNA ESQUERDA */
.col-esq {
    width: 190px; /* TRAVA SAFARI */
    font-size: 14px;
    line-height: 1.5;
}

/* COLUNA DIREITA */
.col-dir {
    width: 160px; /* TRAVA SAFARI */
    font-size: 14px;
    line-height: 1.5;
    text-align: left;
}

/* RODAPE */
.rodape {
    margin-top: 10px;
    font-size: 14px;
}

.lote-conf {
    font-weight: bold;
    margin-top: 5px;
}

/* QR */
.qr {
    position: absolute;
    right: 20px;
    bottom: 20px;
}

.qr img {
    width: 75px;
    height: 75px;
}

/* BOTAO */
button {
    margin-top: 25px;
    padding: 18px 40px;
    font-size: 20px;
    border-radius: 16px;
    border: none;
    background: #333;
    color: white;
}

/* PRINT */
@media print {
    button { display: none; }
    body { background: white; }
}
</style>
</head>

<body>

<div class="etiqueta">

<div class="topo">
    <div id="produto" class="produto">Produto</div>
    <div id="volume" class="volume">1L</div>
</div>

<div class="conteudo">

<div class="col-esq">
    <div><b>CONSERVAR:</b></div>
    <div><b>VAL. ORIGINAL:</b></div>
    <div><b>MANIPULAÇÃO:</b></div>
    <div><b>VALIDADE:</b></div>
    <div><b>MARCA / FORN.:</b></div>
    <div><b>SIF:</b></div>
    <div><b>LOTE:</b></div>
</div>

<div class="col-dir">
    <div id="conservacao">Refrigerado</div>
    <div id="val_original">-</div>
    <div id="manipulacao">-</div>
    <div id="validade">-</div>
    <div id="marca">-</div>
    <div id="sif">-</div>
    <div id="lote">-</div>
</div>

</div>

<div class="rodape">
    <div id="resp">RESP.: Luiz</div>
    <div>CURVELLO CONFEITARIA</div>
    <div id="lc" class="lote-conf">LOTE CONFEITARIA: -</div>
</div>

<div class="qr">
    <img id="qrcode">
</div>

</div>

<button onclick="window.print()">Imprimir etiqueta</button>

<script>

// PEGAR PARAMETROS
const p = new URLSearchParams(window.location.search);

// FUNÇÃO SEGURA
function set(id, nome) {
    let v = p.get(nome);
    if (v && v !== "undefined") {
        document.getElementById(id).innerText = v;
    }
}

// CAMPOS
set("produto","produto");
set("volume","volume");
set("conservacao","conservacao");
set("val_original","val_original");
set("manipulacao","manipulacao");
set("validade","validade");
set("marca","marca");
set("sif","sif");
set("lote","lote");
set("resp","resp");
set("lc","lc");

// QR
let lote = p.get("lote") || "000";

document.getElementById("qrcode").src =
"https://api.qrserver.com/v1/create-qr-code/?size=120x120&data=" + encodeURIComponent(lote);

</script>

</body>
</html>
