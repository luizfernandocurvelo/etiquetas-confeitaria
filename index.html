<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Etiqueta</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  display: flex;
  flex-direction: column;
  align-items: center;
  background: #e9e9e9;
}

/* ETIQUETA */
.etiqueta {
  width: 60mm;
  height: 40mm;
  padding: 4mm;
  border: 2px solid black;
  border-radius: 8mm;
  background: #f5f5f5;
  box-sizing: border-box;
  display: flex;
  flex-direction: column;
}

/* TOPO */
.topo {
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-weight: bold;
  font-size: 14px;
  margin-bottom: 4px;
}

/* LINHAS */
.linha {
  display: flex;
  justify-content: space-between;
  font-size: 10px;
  margin: 1px 0;
}

.label {
  font-weight: bold;
}

.valor {
  text-align: right;
}

/* ESPAÇO CENTRAL */
.meio {
  flex-grow: 1;
}

/* RODAPÉ */
.rodape {
  display: flex;
  justify-content: space-between;
  align-items: flex-end;
}

.info {
  font-size: 9px;
  line-height: 1.2;
}

.lote-conf {
  margin-top: 4px;
}

/* QR */
.qrcode {
  width: 45px;
  height: 45px;
}

/* BOTÃO */
button {
  margin-top: 18px;
  padding: 12px 28px;
  font-size: 15px;
  border: none;
  border-radius: 10px;
  background: #2b2b2b;
  color: white;
  cursor: pointer;
}

@media print {
  body { background: white; }
  button { display: none; }
}
</style>
</head>

<body>

<div class="etiqueta">

  <div class="topo">
    <div id="produto">LEITE INTEGRAL</div>
    <div id="peso">1L</div>
  </div>

  <div class="meio">

    <div class="linha"><span class="label">CONSERVAR:</span><span class="valor" id="conservacao">RESFRIADO</span></div>
    <div class="linha"><span class="label">VAL. ORIGINAL:</span><span class="valor" id="val_original">10/08/2026</span></div>
    <div class="linha"><span class="label">MANIPULAÇÃO:</span><span class="valor" id="manipulacao">06/03/2026 13:30</span></div>
    <div class="linha"><span class="label">VALIDADE:</span><span class="valor" id="validade">10/03/2026 13:30</span></div>
    <div class="linha"><span class="label">MARCA / FORN.:</span><span class="valor" id="marca">NESTLE</span></div>
    <div class="linha"><span class="label">SIF:</span><span class="valor" id="sif">2025</span></div>
    <div class="linha"><span class="label">LOTE:</span><span class="valor" id="lote">HJ6782</span></div>

  </div>

  <div class="rodape">
    <div class="info">
      RESP.: <span id="resp">LUIZ</span><br>
      CURVELLO CONFEITARIA

      <div class="lote-conf">
        LOTE CONFEITARIA: <span id="lc">31411</span>
      </div>
    </div>

    <img id="qr" class="qrcode">
  </div>

</div>

<button onclick="window.print()">Imprimir etiqueta</button>

<script>
const params = new URLSearchParams(window.location.search);

// função padrão
function set(id, param) {
  const valor = params.get(param);
  if (valor) document.getElementById(id).innerText = valor;
}

// campos (Glide)
set("produto","produto");
set("peso","peso");
set("conservacao","conservacao");
set("val_original","val_original");
set("manipulacao","manipulacao");
set("validade","validade");
set("marca","marca");
set("sif","sif");
set("lote","lote");
set("resp","resp");
set("lc","lc");

// QR (igual ao modelo → pode manter link completo)
document.getElementById("qr").src =
  "https://api.qrserver.com/v1/create-qr-code/?size=100x100&data=" +
  encodeURIComponent(window.location.href);
</script>

</body>
</html>
