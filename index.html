<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Etiqueta</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: #f2f2f2;
    display: flex;
    flex-direction: column;
    align-items: center;
    margin-top: 40px;
}

/* ETIQUETA (SEU LAYOUT ORIGINAL) */
.etiqueta {
    width: 420px;
    background: #fff;
    border: 4px solid #000;
    border-radius: 25px;
    padding: 20px 22px;
    position: relative;
}

/* TOPO */
.topo {
    display: flex;
    justify-content: space-between;
}

.produto {
    font-size: 26px;
    font-weight: bold;
    margin-bottom: 12px;
}

.volume {
    font-size: 22px;
    font-weight: bold;
}

/* CONTEÚDO */
.conteudo {
    display: flex;
}

/* COLUNA ESQUERDA */
.col-esq {
    width: 190px;
    font-size: 14px;
    line-height: 1.4;
}

/* COLUNA DIREITA */
.col-dir {
    width: 180px;
    font-size: 14px;
    line-height: 1.4;
    text-align: left;
}

/* RODAPÉ */
.rodape {
    margin-top: 12px;
    font-size: 14px;
}

.lote-conf {
    margin-top: 6px;
    font-weight: bold;
}

/* QR */
.qr {
    position: absolute;
    bottom: 20px;
    right: 20px;
}

.qr img {
    width: 80px;
    height: 80px;
}

/* BOTÃO */
button {
    margin-top: 25px;
    padding: 18px 40px;
    font-size: 20px;
    border-radius: 16px;
    border: none;
    background: #333;
    color: white;
    cursor: pointer;
}

/* PRINT */
@media print {
    body { background: white; }
    button { display: none; }
}
</style>
</head>

<body>

<div class="etiqueta">

    <div class="topo">
        <div id="produto" class="produto">Produto</div>
        <div id="volume" class="volume">1L</div>
    </div>

    <div class="conteudo">

        <div class="col-esq">
            <div><b>CONSERVAR:</b></div>
            <div><b>VAL. ORIGINAL:</b></div>
            <div><b>MANIPULAÇÃO:</b></div>
            <div><b>VALIDADE:</b></div>
            <div><b>MARCA / FORN.:</b></div>
            <div><b>SIF:</b></div>
            <div><b>LOTE:</b></div>
        </div>

        <div class="col-dir">
            <div id="conservacao">Refrigerado</div>
            <div id="val_original">-</div>
            <div id="manipulacao">-</div>
            <div id="validade">-</div>
            <div id="marca">-</div>
            <div id="sif">-</div>
            <div id="lote">-</div>
        </div>

    </div>

    <div class="rodape">
        <div id="resp">RESP.: Luiz</div>
        <div>CURVELLO CONFEITARIA</div>
        <div id="lc" class="lote-conf">LOTE CONFEITARIA: 000</div>
    </div>

    <div class="qr">
        <img id="qrcode">
    </div>

</div>

<button onclick="window.print()">Imprimir etiqueta</button>

<script>

// PEGAR PARAMETROS DO GLIDE
const p = new URLSearchParams(window.location.search);

// FUNÇÃO PARA PREENCHER
function set(id, nome) {
    let v = p.get(nome);
    if (v && v !== "undefined") {

        // REMOVE VÍRGULA DAS DATAS
        v = v.replace(",", "");

        document.getElementById(id).innerText = v;
    }
}

// CAMPOS
set("produto","produto");
set("volume","volume");
set("val_original","val_original");
set("manipulacao","manipulacao");
set("validade","validade");
set("marca","marca");
set("sif","sif");
set("lote","lote");

// CONSERVAÇÃO FIXA
document.getElementById("conservacao").innerText = "Refrigerado";

// RESP
let resp = p.get("resp");
if (resp) {
    document.getElementById("resp").innerText = "RESP.: " + resp;
}

// LOTE CONFEITARIA
let lc = p.get("lc");
if (lc) {
    document.getElementById("lc").innerText = "LOTE CONFEITARIA: " + lc;
}

// QR CODE
let lote = p.get("lote") || "000";

document.getElementById("qrcode").src =
"https://api.qrserver.com/v1/create-qr-code/?size=120x120&data=" + encodeURIComponent(lote);

</script>

</body>
</html>
