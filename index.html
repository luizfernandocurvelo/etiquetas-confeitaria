<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Etiqueta</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  display: flex;
  flex-direction: column;
  align-items: center;
  background: #f2f2f2;
  padding-top: 20px;
}

.etiqueta {
  width: 60mm;
  height: 40mm;
  padding: 3mm;
  border: 2px solid #000;
  border-radius: 6mm;
  background: #fff;
  box-sizing: border-box;
  position: relative;
  display: flex;
  flex-direction: column;
}

.topo {
  display: grid;
  grid-template-columns: 1fr 52px;
  align-items: center;
  font-weight: 700;
  font-size: 13px;
  margin-bottom: 5px;
}

.conteudo {
  display: grid;
  grid-template-columns: 1fr 52px;
  row-gap: 1px;
  column-gap: 6px;
  font-size: 7.6px;
  line-height: 1.1;
}

.label {
  font-weight: 600;
  font-size: 7px;
}

.valor {
  text-align: left;
  white-space: nowrap;
  font-size: 7.4px;
}

.rodape {
  margin-top: auto;
  font-size: 7.2px;
  line-height: 1.1;
  padding-right: 48px;
}

.lote-conf {
  font-weight: 700;
  margin-top: 3px;
}

.qrcode {
  position: absolute;
  right: 5mm;
  bottom: 1.5mm;
  width: 42px;
  height: 42px;
}

button {
  margin-top: 22px;
  padding: 16px 36px;
  font-size: 17px;
  border: none;
  border-radius: 14px;
  background: #2b2b2b;
  color: white;
  cursor: pointer;
}

@media print {
  body {
    background: white;
    padding: 0;
  }
  button {
    display: none;
  }
}
</style>
</head>

<body>

<div class="etiqueta">

  <div class="topo">
    <div id="produto">Leite Integral</div>
    <div id="volume">1L</div>
  </div>

  <div class="conteudo">
    <div class="label">CONSERVAR:</div><div class="valor" id="conservacao">Refrigerado</div>
    <div class="label">VAL. ORIGINAL:</div><div class="valor" id="val_original">10/08/2026</div>
    <div class="label">MANIPULAÇÃO:</div><div class="valor" id="manipulacao">06/03/2026 13:30</div>
    <div class="label">VALIDADE:</div><div class="valor" id="validade">10/03/2026 13:30</div>
    <div class="label">MARCA / FORN.:</div><div class="valor" id="marca">Nestle</div>
    <div class="label">SIF:</div><div class="valor" id="sif">2025</div>
    <div class="label">LOTE:</div><div class="valor" id="lote">HJ6782</div>
  </div>

  <div class="rodape">
    <div id="resp">RESP.: Luiz</div>
    CURVELLO CONFEITARIA

    <div class="lote-conf" id="lote_conf">
      LOTE CONFEITARIA: 31411
    </div>
  </div>

  <img id="qr" class="qrcode">

</div>

<button onclick="window.print()">Imprimir etiqueta</button>

<script>
const p = new URLSearchParams(window.location.search);

function get(nome, padrao="") {
  return p.get(nome) || padrao;
}

document.getElementById("produto").innerText = get("produto", "Leite Integral");
document.getElementById("volume").innerText = get("volume", "1L");

// FIXO
document.getElementById("conservacao").innerText = "Refrigerado";

// DADOS
document.getElementById("val_original").innerText = get("val_original", "10/08/2026");
document.getElementById("manipulacao").innerText = get("manipulacao", "06/03/2026 13:30");
document.getElementById("validade").innerText = get("validade", "10/03/2026 13:30");
document.getElementById("marca").innerText = get("marca", "Nestle");
document.getElementById("sif").innerText = get("sif", "2025");
document.getElementById("lote").innerText = get("lote", "HJ6782");

// RODAPÉ
document.getElementById("resp").innerText = "RESP.: " + get("resp", "Luiz");

document.getElementById("lote_conf").innerText =
  "LOTE CONFEITARIA: " + get("lote_conf", "31411");

// QR CODE
const url = window.location.href;

document.getElementById("qr").src =
  "https://api.qrserver.com/v1/create-qr-code/?size=100x100&data=" +
  encodeURIComponent(url);
</script>

</body>
</html>
