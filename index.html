<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Etiqueta</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  display: flex;
  flex-direction: column;
  align-items: center;
  background: #f2f2f2;
}

/* ETIQUETA */
.etiqueta {
  width: 60mm;
  height: 40mm;
  padding: 3mm;
  border: 2px solid black;
  border-radius: 6mm;
  background: white;
  box-sizing: border-box;

  display: flex;
  flex-direction: column;
  justify-content: space-between;

  overflow: hidden; /* 🔥 ESSENCIAL */
}

/* TOPO */
.topo {
  display: flex;
  justify-content: space-between;
  font-weight: bold;
  font-size: 11px;
}

/* LINHAS */
.linha {
  display: flex;
  justify-content: space-between;
  font-size: 8.5px;
  line-height: 1.2;
}

/* RODAPÉ */
.rodape {
  display: flex;
  justify-content: space-between;
  align-items: flex-end;
}

/* TEXTO */
.info {
  font-size: 8px;
  line-height: 1.2;
}

/* QR */
.qrcode {
  width: 42px;
  height: 42px;
}

/* BOTÃO */
button {
  margin-top: 15px;
  padding: 10px 25px;
  font-size: 14px;
  border: none;
  border-radius: 8px;
  background: #2b2b2b;
  color: white;
  cursor: pointer;
}

/* IMPRESSÃO */
@media print {
  body {
    background: white;
  }

  button {
    display: none;
  }
}
</style>
</head>

<body>

<div class="etiqueta">

  <div class="topo">
    <div id="produto">PRODUTO</div>
    <div id="peso"></div>
  </div>

  <div class="linha"><span>CONSERVAR:</span><span id="conservacao"></span></div>
  <div class="linha"><span>VAL. ORIGINAL:</span><span id="val_original"></span></div>
  <div class="linha"><span>MANIPULAÇÃO:</span><span id="manipulacao"></span></div>
  <div class="linha"><span>VALIDADE:</span><span id="validade"></span></div>
  <div class="linha"><span>MARCA:</span><span id="marca"></span></div>
  <div class="linha"><span>SIF:</span><span id="sif"></span></div>
  <div class="linha"><span>LOTE:</span><span id="lote"></span></div>

  <div class="rodape">
    <div class="info">
      RESP.: <span id="resp"></span><br>
      CURVELLO CONFEITARIA<br>
      LOTE CONF.: <span id="lc"></span>
    </div>

    <img id="qr" class="qrcode">
  </div>

</div>

<button onclick="window.print()">Imprimir etiqueta</button>

<script>
const params = new URLSearchParams(window.location.search);

function set(id, param) {
  const valor = params.get(param);
  if (valor) document.getElementById(id).innerText = valor;
}

set("produto", "produto");
set("peso", "peso");
set("conservacao", "conservacao");
set("val_original", "val_original");
set("manipulacao", "manipulacao");
set("validade", "validade");
set("marca", "marca");
set("lote", "lote");
set("resp", "resp");
set("lc", "lc");

const url = window.location.href;
document.getElementById("qr").src =
  "https://api.qrserver.com/v1/create-qr-code/?size=100x100&data=" + encodeURIComponent(url);
</script>

</body>
</html>
