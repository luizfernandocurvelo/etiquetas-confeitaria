<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Etiqueta</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  display: flex;
  flex-direction: column;
  align-items: center;
  background: #e9e9e9;
}

/* ETIQUETA */
.etiqueta {
  width: 60mm;
  height: 40mm;
  padding: 4mm;
  border: 2px solid black;
  border-radius: 8mm;
  background: #f5f5f5;
  box-sizing: border-box;

  display: grid;
  grid-template-columns: 1fr 28px;
  column-gap: 6px;
}

/* CONTEÚDO */
.conteudo {
  display: flex;
  flex-direction: column;
}

/* TOPO */
.topo {
  display: flex;
  justify-content: space-between;
  font-weight: bold;
  font-size: 14px;
  margin-bottom: 4px;
}

/* LINHAS */
.linha {
  display: flex;
  justify-content: space-between;
  font-size: 9.2px;
  margin: 2px 0;
  white-space: nowrap;
}

.label {
  font-weight: bold;
}

.valor {
  margin-left: 6px;
}

/* RODAPÉ */
.rodape {
  margin-top: 4px;
  font-size: 8.8px;
  line-height: 1.25;
}

/* QR */
.qr-container {
  display: flex;
  align-items: flex-end;
  justify-content: center;
}

.qr {
  width: 24px; /* 🔥 menor e elegante */
  height: 24px;
}

/* BOTÃO */
button {
  margin-top: 18px;
  padding: 12px 28px;
  font-size: 15px;
  border: none;
  border-radius: 10px;
  background: #2b2b2b;
  color: white;
  cursor: pointer;
}

@media print {
  button { display: none; }
  body { background: white; }
}
</style>
</head>

<body>

<div class="etiqueta">

  <div class="conteudo">

    <div class="topo">
      <div id="produto">Leite Integral</div>
      <div id="peso">1L</div>
    </div>

    <div class="linha"><span class="label">CONSERVAR:</span><span class="valor" id="conservacao">Resfriado</span></div>
    <div class="linha"><span class="label">VAL. ORIGINAL:</span><span class="valor" id="val_original">18/04/2026 20:00</span></div>
    <div class="linha"><span class="label">MANIPULAÇÃO:</span><span class="valor" id="manipulacao">18/03/2026 00:29</span></div>
    <div class="linha"><span class="label">VALIDADE:</span><span class="valor" id="validade">21/03/2026 00:29</span></div>
    <div class="linha"><span class="label">MARCA / FORN.:</span><span class="valor" id="marca">Nestle</span></div>
    <div class="linha"><span class="label">SIF:</span><span class="valor" id="sif">2025</span></div>
    <div class="linha"><span class="label">LOTE:</span><span class="valor" id="lote">HJ6782</span></div>

    <div class="rodape">
      RESP.: <span id="resp">Luiz</span><br>
      CURVELLO CONFEITARIA<br>
      <strong>LOTE CONFEITARIA: <span id="lc">001</span></strong>
    </div>

  </div>

  <div class="qr-container">
    <img id="qr" class="qr">
  </div>

</div>

<button onclick="window.print()">Imprimir etiqueta</button>

<script>
const params = new URLSearchParams(window.location.search);

function set(id, param) {
  const v = params.get(param);
  if (v) document.getElementById(id).innerText = v;
}

set("produto","produto");
set("peso","peso");
set("conservacao","conservacao");
set("val_original","val_original");
set("manipulacao","manipulacao");
set("validade","validade");
set("marca","marca");
set("sif","sif");
set("lote","lote");
set("resp","resp");
set("lc","lc");

document.getElementById("qr").src =
  "https://api.qrserver.com/v1/create-qr-code/?size=70x70&data=" +
  encodeURIComponent(window.location.href);
</script>

</body>
</html>
