<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Etiqueta</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #eee;
  display: flex;
  flex-direction: column;
  align-items: center;
}

.etiqueta {
  width: 420px;
  height: 220px;
  background: #fff;
  border: 3px solid #000;
  border-radius: 20px;
  padding: 15px;
  box-sizing: border-box;
  position: relative;
}

.topo {
  display: flex;
  justify-content: space-between;
}

.produto {
  font-size: 22px;
  font-weight: bold;
}

.volume {
  font-size: 22px;
  font-weight: bold;
}

.linhas {
  margin-top: 5px;
  font-size: 13px;
}

.linhas b {
  display: inline-block;
  width: 130px;
}

.rodape {
  position: absolute;
  bottom: 10px;
  left: 15px;
  font-size: 13px;
}

.qrcode {
  position: absolute;
  bottom: 10px;
  right: 15px;
  width: 90px;
  height: 90px;
}

button {
  margin-top: 30px;
  padding: 20px 40px;
  font-size: 22px;
  border-radius: 20px;
  border: none;
  background: #333;
  color: white;
  cursor: pointer;
}
</style>
</head>

<body>

<div class="etiqueta">

  <div class="topo">
    <div class="produto" id="produto">-</div>
    <div class="volume" id="volume">1L</div>
  </div>

  <div class="linhas">
    <div><b>CONSERVAR:</b> <span id="conservacao">-</span></div>
    <div><b>VAL. ORIGINAL:</b> <span id="val_original">-</span></div>
    <div><b>MANIPULAÇÃO:</b> <span id="manipulacao">-</span></div>
    <div><b>VALIDADE:</b> <span id="validade">-</span></div>
    <div><b>MARCA / FORN.:</b> <span id="marca">-</span></div>
    <div><b>SIF:</b> <span id="sif">-</span></div>
    <div><b>LOTE:</b> <span id="lote">-</span></div>
  </div>

  <div class="rodape">
    <div>RESP.: <span id="responsavel">-</span></div>
    <div>CURVELLO CONFEITARIA</div>
    <div><b>LOTE CONFEITARIA: <span id="lote_conf">-</span></b></div>
  </div>

  <img id="qr" class="qrcode">

</div>

<button onclick="window.print()">Imprimir etiqueta</button>

<script>
// pegar parâmetros
const params = new URLSearchParams(window.location.search);

// preencher dados
document.getElementById("produto").textContent = params.get("produto") || "-";
document.getElementById("volume").textContent = params.get("volume") || "1L";
document.getElementById("conservacao").textContent = params.get("conservacao") || "-";
document.getElementById("val_original").textContent = params.get("val_original") || "-";
document.getElementById("manipulacao").textContent = params.get("manipulacao") || "-";
document.getElementById("validade").textContent = params.get("validade") || "-";
document.getElementById("marca").textContent = params.get("marca") || "-";
document.getElementById("sif").textContent = params.get("sif") || "-";
document.getElementById("lote").textContent = params.get("lote") || "-";
document.getElementById("responsavel").textContent = params.get("resp") || "-";
document.getElementById("lote_conf").textContent = params.get("lote_conf") || "-";

// QR CODE CORRIGIDO (leve)
const qrUrl =
  window.location.origin +
  window.location.pathname +
  "?id=" + (params.get("lote_conf") || "001");

document.getElementById("qr").src =
  "https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=" +
  encodeURIComponent(qrUrl);

</script>

</body>
</html>
