<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Etiqueta</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  display: flex;
  justify-content: center;
  align-items: flex-start;
  background: #f2f2f2;
  padding-top: 20px;
}

/* ETIQUETA */
.etiqueta {
  width: 60mm;
  height: 40mm;
  padding: 2.5mm;
  border: 2px solid #000;
  border-radius: 6mm;
  background: #fff;
  box-sizing: border-box;
  position: relative;
  display: flex;
  flex-direction: column;
}

/* TOPO */
.topo {
  display: flex;
  justify-content: space-between;
  font-weight: 700;
  font-size: 12.5px;
  margin-bottom: 2px;
}

/* GRID PRINCIPAL */
.conteudo {
  display: grid;
  grid-template-columns: 1fr auto;
  gap: 2px 6px;
  font-size: 8.2px;
  line-height: 1.2;
}

/* LABEL */
.label {
  font-weight: 700;
}

/* VALOR */
.valor {
  text-align: right;
  white-space: nowrap;
}

/* RODAPÉ */
.rodape {
  margin-top: auto;
  font-size: 7.8px;
  line-height: 1.2;
}

/* LOTE CONF */
.lote-conf {
  font-weight: 700;
  margin-top: 2px;
}

/* QR CODE FIXO */
.qrcode {
  position: absolute;
  right: 3mm;
  bottom: 3mm;
  width: 24px;
  height: 24px;
}

/* BOTÃO */
button {
  margin-top: 18px;
  padding: 12px 28px;
  font-size: 15px;
  border: none;
  border-radius: 10px;
  background: #2b2b2b;
  color: white;
  cursor: pointer;
}

@media print {
  body { background: white; padding: 0; }
  button { display: none; }
}
</style>
</head>

<body>

<div class="etiqueta">

  <div class="topo">
    <div>Leite Integral</div>
    <div>1L</div>
  </div>

  <div class="conteudo">
    <div class="label">CONSERVAR:</div><div class="valor">Resfriado</div>
    <div class="label">VAL. ORIGINAL:</div><div class="valor">10/08/2026</div>
    <div class="label">MANIPULAÇÃO:</div><div class="valor">06/03/2026 13:30</div>
    <div class="label">VALIDADE:</div><div class="valor">10/03/2026 13:30</div>
    <div class="label">MARCA / FORN.:</div><div class="valor">Nestle</div>
    <div class="label">SIF:</div><div class="valor">2025</div>
    <div class="label">LOTE:</div><div class="valor">HJ6782</div>
  </div>

  <div class="rodape">
    RESP.: Luiz<br>
    CURVELLO CONFEITARIA

    <div class="lote-conf">
      LOTE CONFEITARIA: 31411
    </div>
  </div>

  <img id="qr" class="qrcode">

</div>

<button onclick="window.print()">Imprimir etiqueta</button>

<script>
const url = window.location.href;

document.getElementById("qr").src =
  "https://api.qrserver.com/v1/create-qr-code/?size=60x60&data=" +
  encodeURIComponent(url);
</script>

</body>
</html>
