<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Etiqueta</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: #f2f2f2;
    display: flex;
    flex-direction: column;
    align-items: center;
    margin-top: 40px;
}

/* ETIQUETA ORIGINAL (SEM MUDAR FORMATO) */
.etiqueta {
    width: 420px;
    background: #fff;
    border: 4px solid #000;
    border-radius: 25px;
    padding: 20px 22px;
    position: relative;
}

/* TOPO */
.topo {
    display: flex;
    justify-content: space-between;
}

.produto {
    font-size: 26px;
    font-weight: bold;
    margin-bottom: 12px; /* MAIS ESPAÇO */
}

.volume {
    font-size: 22px;
    font-weight: bold;
}

/* CONTEUDO */
.conteudo {
    display: flex;
}

/* ESQUERDA */
.col-esq {
    font-size: 14px; /* AJUSTADO */
    line-height: 1.4;
}

.col-esq strong {
    font-size: 14px;
}

/* DIREITA */
.col-dir {
    text-align: left; /* COMO VOCÊ PEDIU */
    font-size: 14px;
    line-height: 1.4;
    margin-left: 25px;
}

/* RODAPÉ */
.rodape {
    margin-top: 12px;
    font-size: 14px;
}

.lote-conf {
    margin-top: 6px;
    font-weight: bold;
}

/* QR */
.qr {
    position: absolute;
    bottom: 20px;
    right: 20px;
}

.qr img {
    width: 80px; /* AJUSTE FINO */
    height: 80px;
}

/* BOTÃO */
button {
    margin-top: 25px;
    padding: 18px 40px;
    font-size: 20px;
    border-radius: 16px;
    border: none;
    background: #333;
    color: white;
    cursor: pointer;
}

/* IMPRESSÃO */
@media print {
    body {
        background: white;
    }
    button {
        display: none;
    }
}
</style>
</head>

<body>

<div class="etiqueta">

    <div class="topo">
        <div id="produto" class="produto">Produto</div>
        <div id="volume" class="volume">1L</div>
    </div>

    <div class="conteudo">

        <div class="col-esq">
            <div><strong>CONSERVAR:</strong></div>
            <div><strong>VAL. ORIGINAL:</strong></div>
            <div><strong>MANIPULAÇÃO:</strong></div>
            <div><strong>VALIDADE:</strong></div>
            <div><strong>MARCA / FORN.:</strong></div>
            <div><strong>SIF:</strong></div>
            <div><strong>LOTE:</strong></div>
        </div>

        <div class="col-dir">
            <div id="conservacao">Refrigerado</div>
            <div id="val_original">00/00/0000</div>
            <div id="manipulacao">00/00/0000 00:00</div>
            <div id="validade">00/00/0000 00:00</div>
            <div id="marca">Marca</div>
            <div id="sif">0000</div>
            <div id="lote">000</div>
        </div>

    </div>

    <div class="rodape">
        <div id="resp">RESP.: Luiz</div>
        <div>CURVELLO CONFEITARIA</div>
        <div id="lc" class="lote-conf">LOTE CONFEITARIA: 000</div>
    </div>

    <div class="qr">
        <img id="qrcode">
    </div>

</div>

<button onclick="window.print()">Imprimir etiqueta</button>

<script>

// PARAMETROS DO GLIDE
const params = new URLSearchParams(window.location.search);

function set(id, param) {
    const valor = params.get(param);
    if (valor) document.getElementById(id).innerText = valor;
}

set("produto", "produto");
set("volume", "volume");
set("conservacao", "conservacao");
set("val_original", "val_original");
set("manipulacao", "manipulacao");
set("validade", "validade");
set("marca", "marca");
set("sif", "sif");
set("lote", "lote");
set("resp", "resp");
set("lc", "lc");

// QR
const lote = params.get("lote") || "000";

document.getElementById("qrcode").src =
"https://api.qrserver.com/v1/create-qr-code/?size=120x120&data=" + encodeURIComponent(lote);

</script>

</body>
</html>
