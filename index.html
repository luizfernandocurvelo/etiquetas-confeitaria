<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Etiqueta</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  display: flex;
  flex-direction: column;
  align-items: center;
  background: #f2f2f2;
}

/* ETIQUETA */
.etiqueta {
  width: 60mm;
  height: 40mm;
  padding: 3mm;
  border: 2px solid black;
  border-radius: 6mm;
  background: white;
  box-sizing: border-box;
  display: flex;
  flex-direction: column;
  position: relative;
}

/* TOPO */
.topo {
  display: flex;
  justify-content: space-between;
  font-weight: bold;
  font-size: 13px;
  margin-bottom: 3px;
}

/* LINHAS */
.linha {
  display: flex;
  justify-content: space-between;
  font-size: 9px;
  margin: 1px 0;
}

.label {
  font-weight: bold;
}

.valor {
  text-align: right;
  min-width: 70px;
}

/* BLOCO */
.bloco {
  flex-grow: 1;
}

/* RODAPÉ */
.rodape {
  font-size: 8.5px;
  line-height: 1.25;
  padding-right: 34px; /* 👈 espaço pro QR */
}

/* LOTE CONF */
.lote-conf {
  font-weight: bold;
  margin-top: 3px;
}

/* QR FIXO */
.qrcode {
  position: absolute;
  bottom: 4px;
  right: 4px;
  width: 26px;
  height: 26px;
}

/* BOTÃO */
button {
  margin-top: 18px;
  padding: 12px 28px;
  font-size: 15px;
  border: none;
  border-radius: 10px;
  background: #2b2b2b;
  color: white;
  cursor: pointer;
}

@media print {
  body { background: white; }
  button { display: none; }
}
</style>
</head>

<body>

<div class="etiqueta">

  <div class="topo">
    <div>Leite Integral</div>
    <div>1L</div>
  </div>

  <div class="bloco">
    <div class="linha"><span class="label">CONSERVAR:</span><span class="valor">Resfriado</span></div>
    <div class="linha"><span class="label">VAL. ORIGINAL:</span><span class="valor">10/08/2026</span></div>
    <div class="linha"><span class="label">MANIPULAÇÃO:</span><span class="valor">06/03/2026 13:30</span></div>
    <div class="linha"><span class="label">VALIDADE:</span><span class="valor">10/03/2026 13:30</span></div>
    <div class="linha"><span class="label">MARCA / FORN.:</span><span class="valor">Nestle</span></div>
    <div class="linha"><span class="label">SIF:</span><span class="valor">2025</span></div>
    <div class="linha"><span class="label">LOTE:</span><span class="valor">HJ6782</span></div>
  </div>

  <div class="rodape">
    RESP.: Luiz<br>
    CURVELLO CONFEITARIA<br>

    <div class="lote-conf">
      LOTE CONFEITARIA: 31411
    </div>
  </div>

  <img id="qr" class="qrcode">

</div>

<button onclick="window.print()">Imprimir etiqueta</button>

<script>
const url = window.location.href;

document.getElementById("qr").src =
  "https://api.qrserver.com/v1/create-qr-code/?size=60x60&data=" +
  encodeURIComponent(url);
</script>

</body>
</html>
