<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Etiqueta</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
}

.etiqueta {
  width: 60mm;
  height: 40mm;
  padding: 3mm;
  border: 2px solid black;
  border-radius: 6px;
  box-sizing: border-box;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
}

.topo {
  display: flex;
  justify-content: space-between;
  font-weight: bold;
  font-size: 11px;
}

.grid {
  display: grid;
  grid-template-columns: 1fr auto;
  font-size: 8px;
  row-gap: 1px;
}

.label {
  font-weight: bold;
}

.footer {
  display: flex;
  justify-content: space-between;
  align-items: flex-end;
  font-size: 8px;
}

.qr img {
  width: 50px;
  height: 50px;
}

button {
  margin-top: 10px;
  display: block;
  margin-left: auto;
  margin-right: auto;
  padding: 8px 16px;
  font-size: 14px;
}
</style>
</head>

<body>

<div class="etiqueta">

  <div class="topo">
    <div id="produto"></div>
    <div id="peso"></div>
  </div>

  <div class="grid">
    <div class="label">CONSERVAR:</div><div id="conservacao"></div>
    <div class="label">VAL. ORIGINAL:</div><div id="val_original"></div>
    <div class="label">MANIPULAÇÃO:</div><div id="manipulacao"></div>
    <div class="label">VALIDADE:</div><div id="validade"></div>

    <div class="label">MARCA / FORN.:</div><div id="marca"></div>
    <div class="label">SIF:</div><div id="sif"></div>
    <div class="label">LOTE:</div><div id="lote"></div>
  </div>

  <div class="footer">
    <div>
      <div id="resp"></div>
      <div>CURVELLO CONFEITARIA</div>
      <div><b>LOTE CONF.:</b> <span id="lc"></span></div>
    </div>

    <div class="qr">
      <img id="qr">
    </div>
  </div>

</div>

<button onclick="window.print()">Imprimir etiqueta</button>

<script>
const params = new URLSearchParams(window.location.search);

function set(id) {
  document.getElementById(id).innerText = params.get(id) || "";
}

["produto","peso","conservacao","val_original","manipulacao","validade","marca","sif","lote","resp","lc"].forEach(set);

// QR CODE
const qrData = window.location.href;
document.getElementById("qr").src =
  "https://api.qrserver.com/v1/create-qr-code/?size=100x100&data=" + encodeURIComponent(qrData);
</script>

</body>
</html>
