<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Etiqueta</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: #f2f2f2;
    display: flex;
    flex-direction: column;
    align-items: center;
    margin-top: 40px;
}

/* ETIQUETA */
.etiqueta {
    width: 420px;
    background: #fff;
    border: 4px solid #000;
    border-radius: 25px;
    padding: 20px 22px;
    position: relative;
}

/* TOPO */
.topo {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 10px;
}

.produto {
    font-size: 26px;
    font-weight: bold;
    margin-bottom: 8px;
}

.volume {
    font-size: 22px;
    font-weight: bold;
}

/* CONTEUDO */
.conteudo {
    display: flex;
    justify-content: space-between;
}

/* COLUNA ESQUERDA */
.col-esq {
    font-size: 14px;
    line-height: 1.6;
}

.col-esq strong {
    font-size: 15px;
}

/* COLUNA DIREITA */
.col-dir {
    text-align: left;
    font-size: 14px;
    line-height: 1.6;
    margin-left: 20px;
}

/* RODAPÉ */
.rodape {
    margin-top: 10px;
    font-size: 14px;
}

.lote-conf {
    margin-top: 6px;
    font-weight: bold;
}

/* QR CODE */
.qr {
    position: absolute;
    bottom: 20px;
    right: 20px;
}

.qr img {
    width: 90px;
    height: 90px;
}

/* BOTÃO */
button {
    margin-top: 25px;
    padding: 18px 40px;
    font-size: 20px;
    border-radius: 16px;
    border: none;
    background: #333;
    color: white;
    cursor: pointer;
}

/* IMPRESSÃO */
@media print {
    body {
        background: white;
    }

    button {
        display: none;
    }

    .etiqueta {
        border: 4px solid black;
    }
}
</style>
</head>

<body>

<div class="etiqueta">

    <!-- TOPO -->
    <div class="topo">
        <div>
            <div id="produto" class="produto">Produto</div>
        </div>
        <div id="volume" class="volume">1L</div>
    </div>

    <!-- CONTEÚDO -->
    <div class="conteudo">

        <!-- ESQUERDA -->
        <div class="col-esq">
            <div><strong>CONSERVAR:</strong></div>
            <div><strong>VAL. ORIGINAL:</strong></div>
            <div><strong>MANIPULAÇÃO:</strong></div>
            <div><strong>VALIDADE:</strong></div>
            <div><strong>MARCA / FORN.:</strong></div>
            <div><strong>SIF:</strong></div>
            <div><strong>LOTE:</strong></div>
        </div>

        <!-- DIREITA -->
        <div class="col-dir">
            <div id="conservacao">Refrigerado</div>
            <div id="val_original">00/00/0000</div>
            <div id="manipulacao">00/00/0000 00:00</div>
            <div id="validade">00/00/0000 00:00</div>
            <div id="marca">Marca</div>
            <div id="sif">0000</div>
            <div id="lote">000</div>
        </div>

    </div>

    <!-- RODAPÉ -->
    <div class="rodape">
        <div id="resp">RESP.: Luiz</div>
        <div>CURVELLO CONFEITARIA</div>
        <div class="lote-conf" id="lc">LOTE CONFEITARIA: 000</div>
    </div>

    <!-- QR CODE -->
    <div class="qr">
        <img id="qrcode" src="">
    </div>

</div>

<button onclick="window.print()">Imprimir etiqueta</button>

<!-- SCRIPT -->
<script>

// PEGAR PARAMETROS DA URL
const params = new URLSearchParams(window.location.search);

function set(id, param) {
    const valor = params.get(param);
    if (valor) document.getElementById(id).innerText = valor;
}

// CAMPOS
set("produto", "produto");
set("volume", "volume");
set("conservacao", "conservacao");
set("val_original", "val_original");
set("manipulacao", "manipulacao");
set("validade", "validade");
set("marca", "marca");
set("sif", "sif");
set("lote", "lote");
set("resp", "resp");
set("lc", "lc");

// GERAR QR CODE COM LOTE
const lote = params.get("lote") || "000";

document.getElementById("qrcode").src =
    "https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=" + encodeURIComponent(lote);

</script>

</body>
</html>
