<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Etiqueta</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  display: flex;
  flex-direction: column;
  align-items: center;
  background: #f2f2f2;
  padding-top: 20px;
}

.etiqueta {
  width: 60mm;
  height: 40mm;
  padding: 3mm;
  border: 2px solid #000;
  border-radius: 6mm;
  background: #fff;
  box-sizing: border-box;
  position: relative;
  display: flex;
  flex-direction: column;
}

.topo {
  display: grid;
  grid-template-columns: 1fr 52px;
  align-items: center;
  font-weight: 700;
  font-size: 13px;
  margin-bottom: 5px;
}

.conteudo {
  display: grid;
  grid-template-columns: 1fr 52px;
  row-gap: 1px;
  column-gap: 6px;
  font-size: 7.6px;
  line-height: 1.1;
}

.label {
  font-weight: 600;
  font-size: 7px;
}

.valor {
  text-align: left;
  white-space: nowrap;
  font-size: 7.4px;
}

.rodape {
  margin-top: auto;
  font-size: 7.2px;
  line-height: 1.1;
  padding-right: 48px;
}

.lote-conf {
  font-weight: 700;
  margin-top: 3px;
}

.qrcode {
  position: absolute;
  right: 4mm;
  bottom: 2mm;
  width: 40px;
  height: 40px;
}

button {
  margin-top: 22px;
  padding: 16px 36px;
  font-size: 17px;
  border: none;
  border-radius: 14px;
  background: #2b2b2b;
  color: white;
  cursor: pointer;
}

@media print {
  body {
    background: white;
    padding: 0;
  }
  button {
    display: none;
  }
}
</style>
</head>

<body>

<div class="etiqueta">

  <div class="topo">
    <div id="produto">Produto</div>
    <div id="volume">1L</div>
  </div>

  <div class="conteudo">
    <div class="label">CONSERVAR:</div><div class="valor">Refrigerado</div>
    <div class="label">VAL. ORIGINAL:</div><div class="valor" id="val_original"></div>
    <div class="label">MANIPULAÇÃO:</div><div class="valor" id="manipulacao"></div>
    <div class="label">VALIDADE:</div><div class="valor" id="validade"></div>
    <div class="label">MARCA / FORN.:</div><div class="valor" id="marca"></div>
    <div class="label">SIF:</div><div class="valor" id="sif"></div>
    <div class="label">LOTE:</div><div class="valor" id="lote"></div>
  </div>

  <div class="rodape">
    RESP.: <span id="resp"></span><br>
    CURVELLO CONFEITARIA

    <div class="lote-conf">
      LOTE CONFEITARIA: <span id="lote_conf"></span>
    </div>
  </div>

  <img id="qr" class="qrcode">

</div>

<button onclick="window.print()">Imprimir etiqueta</button>

<script>
// 🔹 pegar parâmetros da URL
const params = new URLSearchParams(window.location.search);
  const id = params.get("id");
  console.log("ID recebido:", id);

// 🔹 função para remover vírgula das datas
function formatarData(valor) {
  if (!valor) return "-";
  return valor.replace(",", "");
}

// 🔹 preencher dados
document.getElementById("produto").textContent = params.get("produto") || "-";
document.getElementById("volume").textContent = params.get("volume") || "1L";

document.getElementById("val_original").textContent = formatarData(params.get("val_original"));
document.getElementById("manipulacao").textContent = formatarData(params.get("manipulacao"));
document.getElementById("validade").textContent = formatarData(params.get("validade"));

document.getElementById("marca").textContent = params.get("marca") || "-";
document.getElementById("sif").textContent = params.get("sif") || "-";
document.getElementById("lote").textContent = params.get("lote") || "-";
document.getElementById("resp").textContent = params.get("resp") || "-";
document.getElementById("lote_conf").textContent = params.get("lote_conf") || "-";

// 🔹 QR Code
const url = window.location.href + "&t=" + new Date().getTime();
document.getElementById("qr").src =
  "https://api.qrserver.com/v1/create-qr-code/?size=100x100&data=" +
  encodeURIComponent(url);
</script>

</body>
</html>
