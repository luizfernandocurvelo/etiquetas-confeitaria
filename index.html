<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Etiqueta</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  display: flex;
  flex-direction: column;
  align-items: center;
  background: #f2f2f2;
}

/* ETIQUETA */
.etiqueta {
  width: 60mm;
  height: 40mm;
  padding: 3mm;
  border: 2px solid black;
  border-radius: 6mm;
  background: white;
  box-sizing: border-box;
  display: flex;
  flex-direction: column;
}

/* TOPO */
.topo {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 4px; /* RESPIRO */
}

#produto {
  font-weight: 800;
  font-size: 13px;
}

#peso {
  font-weight: bold;
  font-size: 12px;
}

/* TABELA */
.tabela {
  display: grid;
  grid-template-columns: 1fr auto;
  row-gap: 2px;
  font-size: 9px;
  margin-bottom: 4px;
}

.label {
  font-weight: bold;
}

.valor {
  text-align: right;
  min-width: 70px;
}

/* RODAPÉ */
.rodape {
  display: flex;
  justify-content: space-between;
  align-items: flex-end;
  margin-top: auto;
}

/* TEXTO */
.info {
  font-size: 8.5px;
  line-height: 1.3;
}

.lote-conf {
  margin-top: 4px; /* SEPARAÇÃO REAL */
  font-weight: bold;
}

/* QR */
.qrcode {
  width: 38px;
  height: 38px;
}

/* BOTÃO */
button {
  margin-top: 18px;
  padding: 12px 28px;
  font-size: 15px;
  border: none;
  border-radius: 10px;
  background: #2b2b2b;
  color: white;
  cursor: pointer;
}

@media print {
  button { display: none; }
  body { background: white; }
}
</style>
</head>

<body>

<div class="etiqueta">

  <div class="topo">
    <div id="produto"></div>
    <div id="peso"></div>
  </div>

  <div class="tabela">
    <div class="label">CONSERVAR:</div><div class="valor" id="conservacao"></div>
    <div class="label">VAL. ORIGINAL:</div><div class="valor" id="val_original"></div>
    <div class="label">MANIPULAÇÃO:</div><div class="valor" id="manipulacao"></div>
    <div class="label">VALIDADE:</div><div class="valor" id="validade"></div>
    <div class="label">MARCA / FORN.:</div><div class="valor" id="marca"></div>
    <div class="label">SIF:</div><div class="valor" id="sif"></div>
    <div class="label">LOTE:</div><div class="valor" id="lote"></div>
  </div>

  <div class="rodape">
    <div class="info">
      RESP.: <span id="resp"></span><br>
      CURVELLO CONFEITARIA

      <div class="lote-conf">
        LOTE CONFEITARIA: <span id="lc"></span>
      </div>
    </div>

    <img id="qr" class="qrcode">
  </div>

</div>

<button onclick="window.print()">Imprimir etiqueta</button>

<script>
const params = new URLSearchParams(window.location.search);

// DADOS PADRÃO (TESTE)
const d = {
  produto: "Leite Integral",
  peso: "1kg",
  conservacao: "Resfriado",
  val_original: "18/04/2026 20:00",
  manipulacao: "18/03/2026 00:29",
  validade: "21/03/2026 00:29",
  marca: "Nestle",
  sif: "2025",
  lote: "HJ6782",
  resp: "Luiz",
  lc: "001"
};

function set(id, param) {
  document.getElementById(id).innerText =
    params.get(param) || d[param] || "";
}

// CAMPOS
set("produto","produto");
set("peso","peso");
set("conservacao","conservacao");
set("val_original","val_original");
set("manipulacao","manipulacao");
set("validade","validade");
set("marca","marca");
set("sif","sif");
set("lote","lote");
set("resp","resp");
set("lc","lc");

// QR MAIS LIMPO (SÓ O LOTE DA CONFEITARIA)
const qrData = "Lote: " + (params.get("lc") || d.lc);
document.getElementById("qr").src =
  "https://api.qrserver.com/v1/create-qr-code/?size=100x100&data=" +
  encodeURIComponent(qrData);

</script>

</body>
</html>
